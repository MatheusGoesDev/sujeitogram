<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Sujeitogram</title>
</head>

<body>
  <div id="wrapper">
    <div id="container">
      <div class="column left">
        <div class="main">

        </div>
      </div>
      <div class="column right">
        <div class="login-painel">
          <div class="logo">
            <img class="logo-img" src="./assets/logo.png" alt="">
            <form action="">
              <input type="text" placeholder="Telefone, usuario ou email" name="username">
              <input type="password" placeholder="Senha" name="password">
              <input type="submit" value="Entrar">
            </form>
          </div>
        </div>
        <div class="infobox">
            <p>Não possui uma conta? <a href="/">Cadastre-se</a></p>
          </div>
          <div class="get-app-panel">
            Obtenha o aplicativo
            <div class="app-buttons">
              <a href="/">
                <img src="./assets/appstore.png" alt="Baixe na Apple Store">
              </a>
              <a href="/">
                <img src="./assets/googleplay.png" alt="Baize no Google Play">
              </a>
            </div>
          </div>
      </div>
    </div>
  </div>
  <footer>
    <div class="footer-inner">
      <a href="">About us</a>
      <a href="">Support</a>
      <a href="">Blog</a>
      <a href="">Press</a>
      <a href="">API</a>
      <a href="">Jobs</a>
      <a href="">Privacy</a>
      <a href="">Terms</a>
      <a href="">Directory</a>
      <a href="">Profiles</a>
      <a href="">Hastags</a>
      <a href="">Language</a>
      <div class="text-small">@ 2026 Instagram</div>
    </div>
  </footer>
</body>

</html>
